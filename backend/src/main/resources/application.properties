spring.application.name=backend

# 1. Supabase Database Connection (Perfected for PostGIS)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.diovttpwolqutuqadqgm.supabase.co:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:&^%$#@!shivom}

# 2. Hibernate Settings
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# 3. AI Service Configuration
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
roadwatch.ai.optional=true

# 4. File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 5. Jackson & Date Formatting
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata

# 6. Image Storage Settings
roadwatch.uploads.dir=${ROADWATCH_UPLOADS_DIR:uploads}
roadwatch.public-base-url=${ROADWATCH_PUBLIC_BASE_URL:http://localhost:8080}

# 7. Admin Auth & JWT Settings
roadwatch.admin.username=${ADMIN_USERNAME:admin}
roadwatch.admin.password=${ADMIN_PASSWORD:admin123}
roadwatch.jwt.secret=${JWT_SECRET:roadwatch-jwt-secret-change-me-in-production-min-32-chars}
roadwatch.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# 8. CORS (Vercel Frontend Allowed Here!)
roadwatch.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://roadwatch-olive.vercel.app}

logging.level.org.hibernate.orm.jdbc.bind=WARNspring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.time-zone=Asia/Kolkata
