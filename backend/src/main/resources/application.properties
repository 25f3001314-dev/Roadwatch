spring.application.name=backend

# =============================================================
# DATABASE CONFIGURATION
# =============================================================
# Provide sane defaults so the app can boot locally without env vars.
# Override via SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/roadwatch}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# =============================================================
# SERVER CONFIGURATION
# =============================================================
server.port=${PORT:8080}
server.servlet.context-path=/

# =============================================================
# AI SERVICE
# =============================================================
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
roadwatch.ai.optional=${ROADWATCH_AI_OPTIONAL:true}

# =============================================================
# FILE UPLOAD CONFIGURATION
# =============================================================
roadwatch.uploads.dir=${ROADWATCH_UPLOADS_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================================
# PUBLIC BASE URL
# =============================================================
roadwatch.public-base-url=${ROADWATCH_PUBLIC_BASE_URL:http://localhost:8080}

# =============================================================
# ADMIN CREDENTIALS
# =============================================================
roadwatch.admin.username=${ADMIN_USERNAME:admin}
roadwatch.admin.password=${ADMIN_PASSWORD:admin123}

# =============================================================
# JWT CONFIGURATION
# =============================================================
# NOTE: Change this in production. Keep it at least 32 characters.
roadwatch.jwt.secret=${JWT_SECRET:roadwatch-jwt-secret-change-me-in-production-min-32-chars}
roadwatch.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# =============================================================
# CORS CONFIGURATION
# =============================================================
# Wildcards are not supported by Spring's allowedOrigins; use allowedOriginPatterns for wildcard domains.
roadwatch.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://roadwatch-olive.vercel.app,https://github.dev}
roadwatch.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app,https://*.github.dev}

# =============================================================
# JACKSON CONFIGURATION
# =============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata

# =============================================================
# ACTUATOR
# =============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=RoadWatch Governance API
info.app.version=2.0.0
info.app.description=National Road Governance, Transparency and Accountability Platform

# =============================================================
# SECURITY / RATE LIMIT
# =============================================================
roadwatch.security.rate-limit.enabled=${ROADWATCH_RATE_LIMIT_ENABLED:true}
roadwatch.security.rate-limit.writes-per-minute=${ROADWATCH_RATE_LIMIT_WRITES_PER_MINUTE:60}

# =============================================================
# SWAGGER / OPENAPI
# =============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.api-docs.path=/v3/api-docs

# =============================================================
# LOGGING
# =============================================================
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.com.roadwatch=INFO
logging.level.AUDIT=INFO
logging.pattern.level=%5p [rid=%X{requestId:-}]
