spring.application.name=backend

# =========================

# DATABASE CONFIGURATION

# =========================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# =========================

# SERVER CONFIGURATION

# =========================

server.port=${PORT:8080}

# =========================

# AI SERVICE

# =========================

ai.service.url=${AI_SERVICE_URL:[http://localhost:8000}](http://localhost:8000})
roadwatch.ai.optional=true

# =========================

# FILE UPLOAD CONFIGURATION

# =========================

roadwatch.uploads.dir=${UPLOAD_DIR:uploads}

# =========================

# PUBLIC BASE URL

# =========================

roadwatch.public-base-url=${PUBLIC_BASE_URL}

# =========================

# ADMIN CONFIG

# =========================

roadwatch.admin.username=${ADMIN_USERNAME:admin}
roadwatch.admin.password=${ADMIN_PASSWORD:admin123}

# =========================

# JWT CONFIGURATION

# =========================

roadwatch.jwt.secret=${JWT_SECRET}
roadwatch.jwt.expiration-ms=86400000

# =========================

# CORS CONFIGURATION

# =========================

roadwatch.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# =========================

# FILE SIZE

# =========================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================

# JACKSON CONFIG

# =========================

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata
roadwatch.uploads.dir=${ROADWATCH_UPLOADS_DIR:uploads}
roadwatch.public-base-url=${ROADWATCH_PUBLIC_BASE_URL:http://localhost:8080}
roadwatch.admin.username=${ADMIN_USERNAME:admin}
roadwatch.admin.password=${ADMIN_PASSWORD:admin123}
roadwatch.jwt.secret=${JWT_SECRET:roadwatch-jwt-secret-change-me-in-production-min-32-chars}
roadwatch.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
roadwatch.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://roadwatch-olive.vercel.app}
logging.level.org.hibernate.orm.jdbc.bind=WARN
