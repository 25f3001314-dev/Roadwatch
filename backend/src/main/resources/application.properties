spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/roadwatch}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
spring.jpa.show-sql=false

ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Image storage (mounted in Docker)
roadwatch.uploads.dir=${ROADWATCH_UPLOADS_DIR:uploads}
roadwatch.public-base-url=${ROADWATCH_PUBLIC_BASE_URL:http://localhost:8080}

# Admin auth
roadwatch.admin.username=${ADMIN_USERNAME:admin}
roadwatch.admin.password=${ADMIN_PASSWORD:admin123}
roadwatch.jwt.secret=${JWT_SECRET:roadwatch-jwt-secret-change-me-in-production}
roadwatch.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS (comma-separated origins)
roadwatch.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

logging.level.org.hibernate.orm.jdbc.bind=WARN
