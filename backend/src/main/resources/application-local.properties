# Run backend WITHOUT Docker (H2 in-memory database)
spring.datasource.url=jdbc:h2:file:./data/roadwatch;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# AI optional when not running
ai.service.url=http://localhost:8000
roadwatch.ai.optional=true

roadwatch.uploads.dir=uploads
# Fallback only - ImageStorageService auto-detects request scheme/host
roadwatch.public-base-url=http://localhost:8080

roadwatch.admin.username=admin
roadwatch.admin.password=admin123
roadwatch.jwt.secret=roadwatch-jwt-secret-change-me-in-production-min-32-chars
roadwatch.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
